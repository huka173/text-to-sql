services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    gpus: all

  backend:
    build:
      context: ./backend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - ollama

    volumes:
      - ./backend:/app
      - ./wren:/app/wren
      - ~/.wren:/root/.wren

volumes:
  postgres_data:
  ollama_data: